name: Publish Snapshot to GitHub Packages
on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      packages: write 
    
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
          server-id: github # Must match the <id> in your pom.xml distributionManagement

      - name: Build and Deploy
        # Running 'deploy' automatically runs 'verify' first
        run: mvn --batch-mode deploy -DskipTests=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Submit Dependency Snapshot
        uses: advanced-security/maven-dependency-submission-action@v5
